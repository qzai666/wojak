<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wojak Draft Assistant</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1><span>Wojak Draft</span><span id="versionText" class="title-version"></span></h1>
        <span id="listenBadge" class="badge">静默</span>
      </header>

      <section class="panel">
        <label>
          前端服务地址
          <span id="remoteApiBaseUrl" class="readonly-field">http://localhost:8787</span>
        </label>
        <label>
          当前窗口队列
          <select id="queueId"></select>
        </label>
        <p id="queueHint" class="hint">检测当前有0个任务队列，还有0s开始执行任务队列</p>
      </section>

      <button id="listenBtn" class="primary" type="button">开始监听</button>

      <p id="remoteStatus" class="status" role="status">当前处于静默状态</p>
      <p id="monitorStatus" class="status" role="status">监听未启动</p>
      <p id="autoLikeStatus" class="status" role="status">暂无执行中的任务</p>
    </main>
    <script src="env.local.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
